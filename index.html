<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --book-max-width: 1100px;
    --book-radius: 8px;
    --spine-width: 12px;
    --spine-color: #d7d2cc;
    --edge-shadow: rgba(0,0,0,0.08);
    --inner-shadow: rgba(0,0,0,0.12);
    --turn-duration: 650ms;
    --turn-ease: cubic-bezier(.2,.6,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; }

  .book-scene {
    width: 100%;
    height: 72vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1600px;
  }

  .book {
    width: min(var(--book-max-width), 95%);
    height: 100%;
    display: flex;
    position: relative;
    touch-action: pan-y;
    border-radius: var(--book-radius);
    /* Ombre globale pour donner une assise */
    box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    background: #fff;
  }

  /* Reliure (spine) centrale */
  .spine {
    position: absolute;
    top: 0;
    bottom: 0;
    left: calc(50% - var(--spine-width)/2);
    width: var(--spine-width);
    pointer-events: none;
    border-left: 1px solid rgba(0,0,0,0.07);
    border-right: 1px solid rgba(0,0,0,0.07);
    background:
      linear-gradient(180deg, rgba(0,0,0,0.06), rgba(0,0,0,0.02) 18%, rgba(255,255,255,0) 45%, rgba(0,0,0,0.03) 82%, rgba(0,0,0,0.08));
    opacity: 0.95;
    z-index: 2;
  }

  .page {
    width: 50%;
    height: 100%;
    background: #fff;
    border: 1px solid #e6e6e6;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    position: relative;
  }
  .page.left  { border-radius: var(--book-radius) 0 0 var(--book-radius); border-right: none; }
  .page.right { border-radius: 0 var(--book-radius) var(--book-radius) 0; border-left: none; }

  /* Effet d'épaisseur: ombre côté extérieur des pages */
  .page.left::after,
  .page.right::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 18px;
    pointer-events: none;
    z-index: 1;
  }
  .page.left::after {
    right: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0) 0%, var(--edge-shadow) 60%, rgba(0,0,0,0.05) 100%);
  }
  .page.right::after {
    left: 0;
    background: linear-gradient(270deg, rgba(0,0,0,0) 0%, var(--edge-shadow) 60%, rgba(0,0,0,0.05) 100%);
  }

  /* Ombre interne près de la reliure pour renforcer la séparation */
  .page.left::before,
  .page.right::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 26px;
    pointer-events: none;
    z-index: 1;
  }
  .page.left::before {
    right: -1px;
    background: linear-gradient(90deg, rgba(0,0,0,0), var(--inner-shadow));
  }
  .page.right::before {
    left: -1px;
    background: linear-gradient(270deg, rgba(0,0,0,0), var(--inner-shadow));
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
    position: relative;
    z-index: 0;
  }

  /* Feuille animée pour le tourne-page */
  .flip {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 50%;
    background: #fff;
    overflow: hidden;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    z-index: 3;
  }

  .flip img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* Ombre dynamique pendant la rotation */
  .flip::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.08), rgba(0,0,0,0));
    opacity: 0;
    transition: opacity var(--turn-duration) var(--turn-ease);
    pointer-events: none;
  }

  .flip.animating::after { opacity: 1; }

  /* Contrôles */
  .controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 1rem auto;
    align-items: center;
  }
  button {
    padding: 8px 20px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    border-radius: 6px;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  #indicator { min-width: 130px; text-align: center; }

  /* Réduction des animations si préférences utilisateur */
  @media (prefers-reduced-motion: reduce) {
    .flip,
    .flip::after {
      transition: none !important;
    }
  }
</style>
</head>
<body>

<div class="book-scene" aria-label="Lecteur de livre">
  <div class="book" role="region" aria-live="polite" id="book">
    <div class="page left"  id="left"  aria-label="Page gauche"></div>
    <div class="spine" aria-hidden="true"></div>
    <div class="page right" id="right" aria-label="Page droite"></div>
  </div>
</div>

<div class="controls">
  <button id="prev" aria-label="Page précédente">← Précédent</button>
  <span id="indicator" aria-live="polite"></span>
  <button id="next" aria-label="Page suivante">Suivant →</button>
</div>

<script>
/*
  Logique:
  - 1ère image = couverture seule à droite
  - Pages internes par paires (2-3, 4-5, ...)
  - Si total pair, dernière seule à gauche (4e de couverture)
  - Animation de tourne-page: droite->gauche à l'aller, gauche->droite au retour
*/

/* 1) DÉFINIR LES PAGES (chaînes OU objets { url }) */
const pageInputs = [
  // Remplacez par vos URLs (SharePoint/CDN). Les images doivent être accessibles et retourner un Content-Type image/*
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide1.png.jpg",
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide2.png.jpg",
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide3.png.jpg",
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide4.png.jpg"
];

/* 2) NORMALISATION */
function toUrl(entry) {
  if (typeof entry === "string") return entry;
  if (entry && typeof entry === "object" && typeof entry.url === "string") return entry.url;
  return null;
}
const pageUrls = pageInputs.map(toUrl).filter(Boolean);

/* 3) CONSTRUCTION DES VUES { left, right } */
function buildViews(urls) {
  const n = urls.length;
  const views = [];
  if (n === 0) return views;

  views.push({ left: null, right: urls[0] }); // Couverture

  let i = 1;
  while (i < n) {
    const left = urls[i] || null;
    const right = urls[i + 1] || null;

    if (left && !right) {
      // Dernière orpheline
      if (n % 2 === 0) views.push({ left, right: null });   // 4e de couv
      else views.push({ left: null, right: left });          // seule à droite
      break;
    }

    views.push({ left, right });
    i += 2;
  }
  return views;
}
const views = buildViews(pageUrls);

/* 4) RENDU */
const leftEl = document.getElementById("left");
const rightEl = document.getElementById("right");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const indicator = document.getElementById("indicator");
const bookEl = document.getElementById("book");

let viewIndex = 0;
let isAnimating = false;

function imgElem(src, alt) {
  const img = document.createElement("img");
  img.src = src;
  img.alt = alt || "Page";
  img.loading = "lazy";
  img.decoding = "async";
  img.draggable = false;
  img.addEventListener("error", () => {
    console.error("Échec de chargement image:", src);
    img.style.opacity = 0.3;
    img.alt = "Image indisponible";
  });
  return img;
}

function clearPage(el) {
  el.innerHTML = "";
}

function renderStatic() {
  const view = views[viewIndex] || { left: null, right: null };
  clearPage(leftEl);
  clearPage(rightEl);
  if (view.left)  leftEl.appendChild(imgElem(view.left, "Page gauche"));
  if (view.right) rightEl.appendChild(imgElem(view.right, "Page droite"));
  indicator.textContent = `Vue ${viewIndex + 1} / ${views.length}`;
  prevBtn.disabled = viewIndex === 0 || isAnimating;
  nextBtn.disabled = viewIndex >= views.length - 1 || isAnimating;
}

/* 5) ANIMATIONS DE TOURNE-PAGE */
function animateTurn(direction, onComplete) {
  // direction: "next" (droite->gauche) ou "prev" (gauche->droite)
  if (isAnimating) return;
  isAnimating = true;
  prevBtn.disabled = true;
  nextBtn.disabled = true;

  const currentView = views[viewIndex] || {};
  const flip = document.createElement("div");
  flip.className = "flip";

  // Contenu à animer
  if (direction === "next" && currentView.right) {
    // On anime la page droite qui se rabat vers la gauche
    flip.style.right = "0";
    flip.style.transformOrigin = "left center";
    flip.appendChild(imgElem(currentView.right, "Tourne-page"));
    bookEl.appendChild(flip);

    // Force le style initial avant transition
    requestAnimationFrame(() => {
      flip.style.transform = "rotateY(0deg)";
      flip.classList.add("animating");
      flip.style.transition = `transform var(--turn-duration) var(--turn-ease)`;
      requestAnimationFrame(() => {
        flip.style.transform = "rotateY(-180deg)";
      });
    });

    flip.addEventListener("transitionend", () => {
      flip.remove();
      onComplete && onComplete();
      isAnimating = false;
      renderStatic();
    }, { once: true });

  } else if (direction === "prev" && currentView.left) {
    // On anime la page gauche qui se rabat vers la droite
    flip.style.left = "0";
    flip.style.transformOrigin = "right center";
    flip.appendChild(imgElem(currentView.left, "Tourne-page"));
    bookEl.appendChild(flip);

    requestAnimationFrame(() => {
      flip.style.transform = "rotateY(0deg)";
      flip.classList.add("animating");
      flip.style.transition = `transform var(--turn-duration) var(--turn-ease)`;
      requestAnimationFrame(() => {
        flip.style.transform = "rotateY(180deg)";
      });
    });

    flip.addEventListener("transitionend", () => {
      flip.remove();
      onComplete && onComplete();
      isAnimating = false;
      renderStatic();
    }, { once: true });

  } else {
    // Si pas d'image à animer (ex: couverture seule), on complète sans animation
    onComplete && onComplete();
    isAnimating = false;
    renderStatic();
  }
}

/* 6) NAVIGATION */
function nextPage() {
  if (isAnimating || viewIndex >= views.length - 1) return;
  animateTurn("next", () => { viewIndex++; });
}
function prevPage() {
  if (isAnimating || viewIndex <= 0) return;
  animateTurn("prev", () => { viewIndex--; });
}

prevBtn.addEventListener("click", prevPage);
nextBtn.addEventListener("click", nextPage);

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") nextPage();
  if (e.key === "ArrowLeft")  prevPage();
});

// Gestes tactiles
let touchStartX = 0;
bookEl.addEventListener("touchstart", (e) => {
  if (e.touches && e.touches.length === 1) touchStartX = e.touches[0].clientX;
}, { passive: true });

bookEl.addEventListener("touchend", (e) => {
  if (!touchStartX) return;
  const endX = (e.changedTouches && e.changedTouches[0]?.clientX) || 0;
  const dx = endX - touchStartX;
  if (dx < -40) nextPage();
  else if (dx > 40) prevPage();
  touchStartX = 0;
}, { passive: true });

/* INIT */
renderStatic();
</script>

</body>
</html>
