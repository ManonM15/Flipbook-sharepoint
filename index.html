<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Livre proportionnel – Intégration SharePoint</title>
<style>
  :root{
    /* FORMAT PHYSIQUE D'UNE PAGE (mm) - A4 par défaut */
    --book-width-mm: 210;
    --book-height-mm: 297;

    --book-radius: 6px;

    /* Durée/courbe de l'animation de tourne-page */
    --turn-duration: 850ms;
    --turn-ease: cubic-bezier(.45,.05,.15,1);

    --spine-width: 26px; /* sera ajusté dynamiquement en JS */
    --edge-shadow: rgba(0,0,0,0.18);
    --inner-shadow: rgba(0,0,0,0.28);

    --img-fade-duration: 220ms;
    --img-fade-ease: ease-out;

    --paper: #f7f1e3;

    /* Mis à jour en JS selon le format mm */
    --spread-aspect: 1.414;

    /* Zoom et pan */
    --zoom: 1;
    --pan-x: 0px;
    --pan-y: 0px;
  }

  html, body { width: 100%; height: 100%; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Fond clair du webpart (SharePoint) */
  body {
    font-family: Arial, sans-serif;
    background: #edf2fb; /* couleur demandée */
    overflow: hidden;
    color: #333;
  }

  .app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .book-scene {
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 2600px;
    padding: 12px;
    overflow: hidden;
    position: relative;
  }

  .book-pedestal {
    position: relative;
    display: grid;
    place-items: center;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }

  .zoom-wrap {
    display: inline-block;
    transform: translate(var(--pan-x), var(--pan-y)) scale(var(--zoom));
    transform-origin: center center;
    will-change: transform;
    touch-action: none;
  }

  .pannable { cursor: grab; }
  .panning  { cursor: grabbing; }

  /* Le livre est dimensionné dynamiquement; on anime width/height pour la fluidité
     lors du passage "page simple" (couverture) <-> "spread" (double page). */
  .book {
    position: relative;
    display: flex;
    touch-action: pan-y;
    border-radius: var(--book-radius);
    background: var(--paper);
    overflow: visible;
    transform-style: preserve-3d;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.25),
      0 8px 16px rgba(0,0,0,0.18);
    transition:
      width  var(--turn-duration) var(--turn-ease),
      height var(--turn-duration) var(--turn-ease);
    will-change: width, height;
  }

  .book::before,
  .book::after {
    content: "";
    position: absolute;
    top: 4px;
    bottom: 4px;
    width: 10px;
    background: repeating-linear-gradient(
      180deg,
      #e8e4da 0px, #e8e4da 1.5px,
      #d8d3c6 1.5px, #d8d3c6 3px
    );
    z-index: 0;
  }
  .book::before { left: -8px; border-radius: 4px 0 0 4px; transform: skewY(2deg); box-shadow: inset -2px 0 4px rgba(0,0,0,0.2); }
  .book::after  { right: -8px; border-radius: 0 4px 4px 0; transform: skewY(-2deg); box-shadow: inset 2px 0 4px rgba(0,0,0,0.2); }

  /* Masquage des tranches uniquement quand il manque réellement un volet en mode intérieur */
  .book.no-left:not(.cover-mode)::before  { display: none; }
  .book.no-right:not(.cover-mode)::after  { display: none; }

  .spine {
    position: absolute;
    top: -6px; bottom: -6px;
    left: calc(50% - var(--spine-width)/2);
    width: var(--spine-width);
    pointer-events: none;
    z-index: 5;
    background:
      linear-gradient(90deg,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.05) 12%,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0) 70%,
        rgba(0,0,0,0.05) 88%,
        rgba(0,0,0,0.25) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.02) 15%, transparent 50%, rgba(0,0,0,0.02) 85%, rgba(0,0,0,0.15));
    box-shadow:
      inset 0 0 24px rgba(0,0,0,0.35),
      0 0 18px rgba(0,0,0,0.25);
    border-radius: 3px;
    transition: opacity 0.3s ease, width 0.2s ease; /* transition douce si la largeur change */
    will-change: opacity, width;
  }
  .book.cover-mode .spine { opacity: 0; }

  .page {
    width: 50%;
    background: var(--paper);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    position: relative;
    z-index: 1;
    transition: width var(--turn-duration) var(--turn-ease);
    will-change: width;
  }
  .page.left  {
    border-radius: var(--book-radius) 0 0 var(--book-radius);
    transform-origin: right center;
  }
  .page.right {
    border-radius: 0 var(--book-radius) var(--book-radius) 0;
    transform-origin: left center;
  }

  .book.cover-mode .page.left,
  .book.cover-mode .page.right {
    border-radius: var(--book-radius);
  }

  .page.left::after,
  .page.right::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    pointer-events: none;
    z-index: 2;
    transition: opacity 0.3s ease;
  }
  .page.left::after {
    right: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0) 0%, var(--edge-shadow) 85%, var(--inner-shadow) 100%);
  }
  .page.right::after {
    left: 0;
    background: linear-gradient(270deg, rgba(0,0,0,0) 0%, var(--edge-shadow) 85%, var(--inner-shadow) 100%);
  }
  .book.cover-mode .page::after { opacity: 0; }

  .page::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 8%, rgba(0,0,0,0) 92%, rgba(0,0,0,0.05) 100%);
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
    position: relative;
    z-index: 0;
    opacity: 0;
    transition: opacity var(--img-fade-duration) var(--img-fade-ease);
  }
  .page img.is-visible { opacity: 1; }

  /* ===================== FEUILLE QUI TOURNE ===================== */
  .flip {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    z-index: 6;
    transform-style: preserve-3d;
    pointer-events: none;
    will-change: transform;
  }
  .flip.cover-flip { width: 100%; }

  .flip-face {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: var(--paper);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .flip-face img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  .flip-face.back { transform: rotateY(180deg); }

  .flip-face .crease {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
  }
  .flip-face.front .crease {
    background: linear-gradient(90deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%);
  }
  .flip-face.back .crease {
    background: linear-gradient(90deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 45%);
  }

  .lift-shadow {
    position: absolute;
    top: 0; bottom: 0;
    width: 42%;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(90deg, rgba(0,0,0,0.32), rgba(0,0,0,0));
    opacity: 0;
    will-change: opacity;
  }
  .lift-shadow.from-right { right: 50%; background: linear-gradient(270deg, rgba(0,0,0,0.32), rgba(0,0,0,0)); }
  .lift-shadow.from-left  { left: 50%; }
  .lift-shadow.cover-from-right { right: 0; width: 60%; background: linear-gradient(270deg, rgba(0,0,0,0.32), rgba(0,0,0,0)); }
  .lift-shadow.cover-from-left  { left: 0; width: 60%; }

  /* États transitoires (si besoin d'ajouter des effets supplémentaires) */
  .book.opening .spine { opacity: 0; }
  .book.closing .spine { opacity: 0; }

  .controls {
    width: 100%;
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1rem;
    padding: 10px 0 14px;
    align-items: center;
    background: transparent;
    color: #333; /* contraste sur fond clair */
  }

  /* Indicateur + Zoom */
  #indicator { min-width: 160px; text-align: center; color: #333; font-size: 0.9rem; }

  .zoom-control {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #333; /* lisible sur fond clair */
    font-size: 0.9rem;
  }
  .zoom-control input[type="range"] {
    width: 180px;
    accent-color: #0b5fff;
  }
  .zoom-value {
    min-width: 3.5em;
    text-align: right;
  }

  /* Flèches latérales */
  .side-arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    width:60px;height:60px;border-radius:50%;
    border:1px solid #c9d6e6;background:rgba(255,255,255,.9);
    font-size:2rem;cursor:pointer;z-index:50;
    box-shadow:0 4px 12px rgba(0,0,0,.2);transition:.2s;
    display:flex;align-items:center;justify-content:center;
  }
  .side-arrow:hover:not(:disabled){transform:translateY(-50%) scale(1.08);}
  .side-arrow:disabled{opacity:.45;cursor:default;box-shadow:none;}
  .left-arrow{left:20px;}
  .right-arrow{right:20px;}

  @media (prefers-reduced-motion: reduce) {
    .flip, .flip-face, .lift-shadow, .page img, .page, .book { transition: none !important; }
  }

  /* ===================== AJOUTS POUR FLUIDITÉ ===================== */
  /* Promotion GPU/captation et confinement pour limiter les repaints globaux */
  .book,
  .page,
  .flip,
  .flip-face,
  .lift-shadow {
    contain: layout paint style;
    will-change: transform, opacity;
  }
  .flip,
  .flip-face,
  .page img {
    transform: translateZ(0);
  }

  /* Allègement visuel pendant l'animation pour réduire le coût paint */
  .book.animating .page::before,
  .book.animating .page::after {
    opacity: 0.6;
  }
  .book.animating .spine {
    opacity: 0.5;
  }

  /* Transition d'opacité douce additionnelle (secours) */
  .book,
  .page {
    transition:
      width  var(--turn-duration) var(--turn-ease),
      height var(--turn-duration) var(--turn-ease),
      opacity 180ms ease-out;
  }

  @media (prefers-reduced-motion: reduce) {
    .book.animating .page::before,
    .book.animating .page::after,
    .book.animating .spine {
      opacity: 1;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="book-scene" aria-label="Lecteur de livre" id="scene">
    <!-- Flèches latérales conservées -->
    <button class="side-arrow left-arrow" id="sidePrev" aria-label="Page précédente">❮</button>
    <button class="side-arrow right-arrow" id="sideNext" aria-label="Page suivante">❯</button>

    <div class="book-pedestal" id="pedestal">
      <div class="zoom-wrap" id="zoomWrap">
        <div class="book" role="region" aria-live="polite" id="book">
          <div class="page left"  id="left"  aria-label="Page gauche"></div>
          <div class="spine" aria-hidden="true"></div>
          <div class="page right" id="right" aria-label="Page droite"></div>
          <div class="lift-shadow from-right" id="liftRight" aria-hidden="true"></div>
          <div class="lift-shadow from-left"  id="liftLeft"  aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Contrôles bas: seuls l’indicateur et le zoom sont conservés -->
  <div class="controls">
    <span id="indicator" aria-live="polite"></span>
    <div class="zoom-control" aria-label="Contrôle du zoom">
      <label for="zoomRange">Zoom</label>
      <input id="zoomRange" type="range" min="0.6" max="2" step="0.05" value="1"
             aria-valuemin="0.6" aria-valuemax="2" aria-valuenow="1" aria-label="Zoom du livre">
      <span class="zoom-value" id="zoomLabel">100%</span>
    </div>
  </div>
</div>

<script>
/* ============================================================
   1) FORMAT D'UNE PAGE (mm) => ratios
   ============================================================ */
const bookWidthMM  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--book-width-mm'))  || 210;
const bookHeightMM = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--book-height-mm')) || 297;
const pageRatio = bookWidthMM / bookHeightMM;        // ratio d'une page
const spreadRatio = (2 * bookWidthMM) / bookHeightMM; // ratio d'un spread

/* Durée tournée centralisée */
const TURN_DURATION_MS = (() => {
  const v = parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue('--turn-duration')
  );
  return Number.isFinite(v) ? v : 850;
})();

/* ============================================================
   2) URLS DES PAGES
   (Correction : normaliser les URLs GitHub "blob" -> "raw" + encodage)
   ============================================================ */
function normalizeUrl(url) {
  if (typeof url !== "string") return null;

  // GitHub blob -> raw
  const blobPattern = /^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/i;
  const m = url.match(blobPattern);
  if (m) {
    const owner = m[1];
    const repo = m[2];
    const branch = m[3];
    const pathSegments = m[4].split('/').map(s => encodeURIComponent(s));
    return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${pathSegments.join('/')}`;
  }

  // Raw déjà présent: encoder les segments chemin si nécessaire
  if (/^https?:\/\/raw\.githubusercontent\.com\//i.test(url)) {
    const parts = url.split('/');
    if (parts.length > 7) {
      const head = parts.slice(0, 7).join('/');
      const tail = parts.slice(7).map(s => encodeURIComponent(decodeURIComponent(s))).join('/');
      return `${head}/${tail}`;
    }
    return url;
  }

  // Sinon, retourner tel quel
  return url;
}

function toUrl(entry) {
  if (typeof entry === "string") return normalizeUrl(entry);
  if (entry && typeof entry === "object" && typeof entry.url === "string") return normalizeUrl(entry.url);
  return null;
}

const pageInputs = [
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide1.png.jpg",
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide2.png.jpg",
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide3.png.jpg",
  "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide4.png.jpg"
];
const pageUrls = pageInputs.map(toUrl).filter(Boolean);

/* ============================================================
   3) VUES (spreads)
   ============================================================ */
function buildViews(urls) {
  const n = urls.length;
  const views = [];
  if (n === 0) return views;

  // Couverture avant (page 1 seule à droite)
  views.push({ left: null, right: urls[0], cover: "front" });

  let i = 1;
  while (i < n) {
    const isLast = i === n - 1;
    if (isLast) {
      // 4e de couverture (dernière page seule à gauche)
      views.push({ left: urls[i], right: null, cover: "back" });
      i += 1;
    } else {
      views.push({ left: urls[i], right: urls[i + 1], cover: false });
      i += 2;
    }
  }
  return views;
}
const views = buildViews(pageUrls);

/* ============================================================
   4) DOM
   ============================================================ */
const leftEl = document.getElementById("left");
const rightEl = document.getElementById("right");
const indicator = document.getElementById("indicator");
const bookEl = document.getElementById("book");
const liftRight = document.getElementById("liftRight");
const liftLeft = document.getElementById("liftLeft");
const pedestal = document.getElementById("pedestal");
const scene = document.getElementById("scene");
const zoomWrap = document.getElementById("zoomWrap");
const zoomRange = document.getElementById("zoomRange");
const zoomLabel = document.getElementById("zoomLabel");
const sidePrev = document.getElementById("sidePrev");
const sideNext = document.getElementById("sideNext");

let viewIndex = 0;
let isAnimating = false;

/* ============================================================
   5) ADAPTATION DU LIVRE AU CONTENEUR + RELIURE
   ============================================================ */
function updateSpineWidth() {
  const bookRect = bookEl.getBoundingClientRect();
  if (!bookRect.width) return;

  const proportional = bookRect.width * 0.018; // 1.8% de la largeur
  const spinePx = Math.max(8, Math.min(36, proportional)); // 8px à 36px
  document.documentElement.style.setProperty('--spine-width', spinePx.toFixed(1) + 'px');
}

function fitBookToContainer() {
  const sceneRect = scene.getBoundingClientRect();
  const availW = Math.max(0, sceneRect.width - 24);
  const availH = Math.max(0, sceneRect.height - 24);
  if (availW <= 0 || availH <= 0) return;

  const currentView = views[viewIndex] || {};
  const isCoverView = currentView.cover === "front" || currentView.cover === "back";
  const ratio = isCoverView ? pageRatio : spreadRatio;

  let w = availW;
  let h = w / ratio;
  if (h > availH) {
    h = availH;
    w = h * ratio;
  }
  bookEl.style.width = w + "px";
  bookEl.style.height = h + "px";

  updateSpineWidth();
  updatePanBoundsAndClamp();
  updatePannableState();
}

/* Debounce via rAF pour resize/observer */
let fitRaf = null;
function scheduleFit() {
  if (fitRaf) return;
  fitRaf = requestAnimationFrame(() => {
    fitRaf = null;
    fitBookToContainer();
  });
}
const resizeObserver = new ResizeObserver(scheduleFit);
resizeObserver.observe(scene);
window.addEventListener("resize", scheduleFit);

/* ============================================================
   6) AFFICHAGE D'UNE VUE
   ============================================================ */
function imgElem(src, alt) {
  const img = document.createElement("img");
  img.src = src;
  img.alt = alt || "Page";
  img.loading = "lazy";
  img.decoding = "async";
  img.draggable = false;
  img.addEventListener("load", () => requestAnimationFrame(() => img.classList.add("is-visible")));
  img.addEventListener("error", () => {
    console.error("Échec de chargement image:", src);
    img.style.opacity = 0.3;
    img.alt = "Image indisponible";
    img.classList.add("is-visible");
  });
  return img;
}
function clearPage(el) { el.innerHTML = ""; }

/* Ajout: insertion via fragment pour limiter le thrash DOM */
function setPageContent(el, src, alt) {
  el.innerHTML = "";
  if (!src) return;
  const frag = document.createDocumentFragment();
  frag.appendChild(imgElem(src, alt));
  el.appendChild(frag);
}

function applyCoverMode(view) {
  const isCover = view.cover === "front" || view.cover === "back";
  bookEl.classList.toggle("cover-mode", isCover);
  bookEl.classList.toggle("no-left", !view.left);
  bookEl.classList.toggle("no-right", !view.right);

  if (view.cover === "front") {
    leftEl.style.width = "0%";
    rightEl.style.width = "100%";
  } else if (view.cover === "back") {
    leftEl.style.width = "100%";
    rightEl.style.width = "0%";
  } else {
    leftEl.style.width = "50%";
    rightEl.style.width = "50%";
  }
}

/* Préchargement des vues adjacentes pour fluidifier */
function preload(src) {
  return new Promise(resolve => {
    if (!src) return resolve();
    const img = new Image();
    img.decoding = "async";
    img.onload = () => resolve();
    img.onerror = () => resolve();
    img.src = src;
  });
}
function preloadAdjacent(index) {
  const prev = views[index - 1];
  const next = views[index + 1];
  const urls = [];
  if (prev) { if (prev.left) urls.push(prev.left); if (prev.right) urls.push(prev.right); }
  if (next) { if (next.left) urls.push(next.left); if (next.right) urls.push(next.right); }
  urls.forEach(u => preload(u));
}

function renderStatic() {
  const view = views[viewIndex] || { left: null, right: null };
  clearPage(leftEl);
  clearPage(rightEl);
  applyCoverMode(view);
  fitBookToContainer();

  setPageContent(leftEl,  view.left,  "Page gauche");
  setPageContent(rightEl, view.right, "Page droite");

  indicator.textContent = views.length ? `Vue ${viewIndex + 1} / ${views.length}` : "Aucune page";

  // Met à jour l'état des flèches latérales
  sidePrev.disabled = isAnimating || viewIndex === 0;
  sideNext.disabled = isAnimating || viewIndex >= views.length - 1;

  // Précharge les vues adjacentes
  preloadAdjacent(viewIndex);
}

/* ============================================================
   7) UTILS ANIMATION
   ============================================================ */
function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

/* Feuille standard (milieu de livre) */
function buildFlipSheet(frontSrc, backSrc, direction) {
  const flip = document.createElement("div");
  flip.className = "flip";
  flip.style.transformOrigin = direction === "next" ? "left center" : "right center";

  const front = document.createElement("div");
  front.className = "flip-face front";
  if (frontSrc) front.appendChild(imgElem(frontSrc, "Recto"));
  const frontCrease = document.createElement("div");
  frontCrease.className = "crease";
  front.appendChild(frontCrease);

  const back = document.createElement("div");
  back.className = "flip-face back";
  if (backSrc) back.appendChild(imgElem(backSrc, "Verso"));
  const backCrease = document.createElement("div");
  backCrease.className = "crease";
  back.appendChild(backCrease);

  flip.appendChild(front);
  flip.appendChild(back);
  return { flip, frontCrease, backCrease };
}

/* Animation générique avec callback de progression (0->1) pour piloter ombres */
function animateRAF(duration, onUpdate, onDone) {
  const start = performance.now();
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = easeInOut(t);
    onUpdate(eased);
    if (t < 1) requestAnimationFrame(frame);
    else onDone && onDone();
  }
  requestAnimationFrame(frame);
}

/* ============================================================
   8) ANIMATION DE TOURNE-PAGE
   ============================================================ */
function animateTurn(direction, onComplete) {
  if (isAnimating) return;
  isAnimating = true;
  bookEl.classList.add("animating");   // allègement visuel pendant l'anim

  // Verrouille les flèches pendant l'animation
  sidePrev.disabled = true;
  sideNext.disabled = true;

  const currentView = views[viewIndex] || {};
  const nextIndex = direction === "next" ? viewIndex + 1 : viewIndex - 1;
  const nextView = views[nextIndex] || {};
  const durationMs = TURN_DURATION_MS;

  const leavingFrontCover = (direction === "next" && currentView.cover === "front");
  const enteringFrontCover = (direction === "prev" && nextView.cover === "front");
  const leavingBackCover   = (direction === "prev" && currentView.cover === "back");
  const enteringBackCover  = (direction === "next" && nextView.cover === "back");

  /* -------- OUVERTURE DE LA COUVERTURE AVANT -------- */
  if (leavingFrontCover || enteringFrontCover) {
    const coverImgSrc = direction === "next" ? currentView.right : nextView.right;

    // Prépare le contenu dessous (spread) pour éviter un "saut"
    if (direction === "next") {
      bookEl.classList.remove("cover-mode", "no-left", "no-right");
      leftEl.style.width = "50%";
      rightEl.style.width = "50%";
      clearPage(leftEl); clearPage(rightEl);
      setPageContent(leftEl,  nextView.left,  "Page gauche");
      setPageContent(rightEl, nextView.right, "Page droite");
      // Le livre change de ratio (page -> spread) avec transition CSS
      fitBookToContainer(); // inclut updateSpineWidth
    }

    Promise.all([preload(coverImgSrc)]).then(() => {
      const flip = document.createElement("div");
      flip.className = "flip cover-flip";
      flip.style.transformOrigin = "left center";
      flip.style.left = "0%";

      const front = document.createElement("div");
      front.className = "flip-face front";
      if (coverImgSrc) front.appendChild(imgElem(coverImgSrc, "Couverture"));
      const frontCrease = document.createElement("div"); frontCrease.className = "crease"; front.appendChild(frontCrease);

      const back = document.createElement("div");
      back.className = "flip-face back";
      const backCrease = document.createElement("div"); backCrease.className = "crease"; back.appendChild(backCrease);

      flip.appendChild(front); flip.appendChild(back);
      bookEl.appendChild(flip);

      liftRight.classList.add("cover-from-right");
      liftRight.style.opacity = "0";

      animateRAF(durationMs, (eased) => {
        // angle négatif (vers l'extérieur) pour ouverture depuis charnière gauche
        const angle = -180 * eased;
        const bulge = Math.sin(eased * Math.PI) * 6;
        flip.style.transform = `rotateY(${angle}deg) rotateX(${bulge}deg)`;

        const creaseI = Math.sin(eased * Math.PI);
        frontCrease.style.opacity = String(creaseI * 0.9);
        backCrease.style.opacity  = String(creaseI * 0.9);

        // Ombre qui monte puis redescend
        liftRight.style.opacity = String(creaseI * 0.9);
      }, () => {
        flip.remove();
        liftRight.style.opacity = "0";
        liftRight.classList.remove("cover-from-right");

        onComplete && onComplete();
        isAnimating = false;
        bookEl.classList.remove("animating");
        renderStatic();
      });
    });
    return;
  }

  /* -------- FERMETURE (ENTRÉE VERS 4e DE COUVERTURE) -------- */
  if (enteringBackCover || leavingBackCover) {
    const frontPageSrc = direction === "next" ? currentView.right : nextView.right; // recto du dernier feuillet
    const coverImgSrc  = direction === "next" ? nextView.left     : currentView.left; // image de 4e de couverture

    if (direction === "prev") {
      // Réouverture depuis 4e : préparer le spread dessous
      bookEl.classList.remove("cover-mode", "no-left", "no-right");
      leftEl.style.width = "50%";
      rightEl.style.width = "50%";
      clearPage(leftEl); clearPage(rightEl);
      setPageContent(leftEl,  nextView.left,  "Page gauche");
      setPageContent(rightEl, nextView.right, "Page droite");
      fitBookToContainer(); // inclut updateSpineWidth
    }

    Promise.all([preload(frontPageSrc), preload(coverImgSrc)]).then(() => {
      const flip = document.createElement("div");
      flip.className = "flip";
      flip.style.transformOrigin = "right center";
      flip.style.left = "50%"; // demi-largeur droite

      const front = document.createElement("div");
      front.className = "flip-face front";
      if (frontPageSrc) front.appendChild(imgElem(frontPageSrc, "Dernier recto"));
      const frontCrease = document.createElement("div"); frontCrease.className = "crease"; front.appendChild(frontCrease);

      const back = document.createElement("div");
      back.className = "flip-face back";
      if (coverImgSrc) back.appendChild(imgElem(coverImgSrc, "4e de couverture"));
      const backCrease = document.createElement("div"); backCrease.className = "crease"; back.appendChild(backCrease);

      flip.appendChild(front); flip.appendChild(back);
      bookEl.appendChild(flip);

      // On vide la page droite sous-jacente pour éviter un double visuel
      clearPage(rightEl);

      liftLeft.classList.add("cover-from-left");
      liftLeft.style.opacity = "0";

      animateRAF(durationMs, (eased) => {
        // La fermeture rabat vers la gauche (angle négatif)
        const angle = -180 * eased;
        const bulge = Math.sin(eased * Math.PI) * 6;
        flip.style.transform = `rotateY(${angle}deg) rotateX(${bulge}deg)`;

        const creaseI = Math.sin(eased * Math.PI);
        frontCrease.style.opacity = String(creaseI * 0.9);
        backCrease.style.opacity  = String(creaseI * 0.9);

        liftLeft.style.opacity = String(creaseI * 0.9);
      }, () => {
        flip.remove();
        liftLeft.style.opacity = "0";
        liftLeft.classList.remove("cover-from-left");

        if (direction === "next") {
          // On est désormais en mode "page simple" (4e) ; le ratio s'ajuste avec transition
          bookEl.classList.add("cover-mode", "no-right");
          leftEl.style.width = "100%";
          rightEl.style.width = "0%";
        }

        onComplete && onComplete();
        isAnimating = false;
        bookEl.classList.remove("animating");
        renderStatic();
      });
    });
    return;
  }

  /* -------- TOURNE-PAGE NORMAL (intérieur) -------- */
  const hasSheet = direction === "next" ? !!currentView.right : !!currentView.left;
  if (!hasSheet) {
    onComplete && onComplete();
    isAnimating = false;
    bookEl.classList.remove("animating");
    renderStatic();
    return;
  }

  const frontSrc = direction === "next" ? currentView.right : currentView.left;
  const backSrc  = direction === "next" ? nextView.left     : nextView.right;

  Promise.all([preload(frontSrc), preload(backSrc)]).then(() => {
    const { flip, frontCrease, backCrease } = buildFlipSheet(frontSrc, backSrc, direction);

    if (direction === "next") {
      flip.style.left = "50%";
    } else {
      flip.style.left = "0%";
    }
    bookEl.appendChild(flip);

    // Sélectionne l'ombre appropriée et initialise à 0
    const liftEl = direction === "next" ? liftRight : liftLeft;
    liftEl.style.opacity = "0";

    animateRAF(durationMs, (eased) => {
      const angle = direction === "next" ? -180 * eased : 180 * eased;
      const bulge = Math.sin(eased * Math.PI) * 5;
      flip.style.transform = `rotateY(${angle}deg) rotateX(${bulge}deg)`;

      const creaseI = Math.sin(eased * Math.PI);
      frontCrease.style.opacity = String(creaseI * 0.9);
      backCrease.style.opacity  = String(creaseI * 0.9);

      // Ombre qui monte puis redescend
      liftEl.style.opacity = String(creaseI * 0.9);
    }, () => {
      flip.remove();
      liftRight.style.opacity = "0";
      liftLeft.style.opacity = "0";
      onComplete && onComplete();
      isAnimating = false;
      bookEl.classList.remove("animating");
      renderStatic();
    });
  });
}

/* ============================================================
   9) NAVIGATION
   ============================================================ */
function nextPage() {
  if (isAnimating || viewIndex >= views.length - 1) return;
  animateTurn("next", () => { viewIndex++; });
}
function prevPage() {
  if (isAnimating || viewIndex <= 0) return;
  animateTurn("prev", () => { viewIndex--; });
}

/* ============================================================
   10) ZOOM
   ============================================================ */
function setZoom(val) {
  const z = Math.max(0.6, Math.min(2, Number(val)));
  document.documentElement.style.setProperty('--zoom', String(z));
  zoomRange.value = String(z);
  zoomRange.setAttribute('aria-valuenow', String(z));
  zoomLabel.textContent = Math.round(z * 100) + '%';
  updatePanBoundsAndClamp();
  updatePannableState();
}
zoomRange.addEventListener('input', (e) => {
  setZoom((e.target && e.target.value) || '1');
});
document.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') setZoom(parseFloat(zoomRange.value) + 0.05);
  else if (e.key === '-' || e.key === '_') setZoom(parseFloat(zoomRange.value) - 0.05);
});
zoomWrap.addEventListener('dblclick', () => setZoom(1));

/* ============================================================
   11) PAN quand zoom > 1
   ============================================================ */
let pan = { x: 0, y: 0 };
let panMax = { x: 0, y: 0 };
let dragState = null;

function applyPan() {
  document.documentElement.style.setProperty('--pan-x', pan.x.toFixed(1) + 'px');
  document.documentElement.style.setProperty('--pan-y', pan.y.toFixed(1) + 'px');
}
function clampPan(nx, ny) {
  const clampedX = Math.max(-panMax.x, Math.min(panMax.x, nx));
  const clampedY = Math.max(-panMax.y, Math.min(panMax.y, ny));
  return { x: clampedX, y: clampedY };
}
function updatePanBoundsAndClamp() {
  const z = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--zoom')) || 1;
  const bookRect = bookEl.getBoundingClientRect();
  const wrapRect = pedestal.getBoundingClientRect();
  if (!bookRect.width || !wrapRect.width) return;

  const scaledW = bookRect.width * z;
  const scaledH = bookRect.height * z;
  const viewW = wrapRect.width;
  const viewH = wrapRect.height;

  panMax.x = Math.max(0, (scaledW - viewW) / 2);
  panMax.y = Math.max(0, (scaledH - viewH) / 2);

  const c = clampPan(pan.x, pan.y);
  pan.x = c.x; pan.y = c.y;
  applyPan();
}
function updatePannableState() {
  const z = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--zoom')) || 1;
  if (z > 1.001 && (panMax.x > 0 || panMax.y > 0)) {
    zoomWrap.classList.add('pannable');
  } else {
    zoomWrap.classList.remove('pannable');
  }
}

pedestal.addEventListener('mousedown', (e) => {
  const z = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--zoom')) || 1;
  if (z <= 1.001) return;
  if ((e.target.closest('.controls') || e.button !== 0)) return;
  dragState = { startX: e.clientX, startY: e.clientY, origX: pan.x, origY: pan.y };
  zoomWrap.classList.add('panning');
  e.preventDefault();
});
window.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  const next = clampPan(dragState.origX + dx, dragState.origY + dy);
  pan.x = next.x; pan.y = next.y;
  applyPan();
});
window.addEventListener('mouseup', () => {
  if (!dragState) return;
  dragState = null;
  zoomWrap.classList.remove('panning');
});

pedestal.addEventListener('touchstart', (e) => {
  const z = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--zoom')) || 1;
  if (z <= 1.001) return;
  if (e.touches.length !== 1) return;
  const t = e.touches[0];
  dragState = { startX: t.clientX, startY: t.clientY, origX: pan.x, origY: pan.y };
  zoomWrap.classList.add('panning');
}, { passive: true });
pedestal.addEventListener('touchmove', (e) => {
  if (!dragState || e.touches.length !== 1) return;
  const t = e.touches[0];
  const dx = t.clientX - dragState.startX;
  const dy = t.clientY - dragState.startY;
  const next = clampPan(dragState.origX + dx, dragState.origY + dy);
  pan.x = next.x; pan.y = next.y;
  applyPan();
}, { passive: true });
pedestal.addEventListener('touchend', () => {
  if (!dragState) return;
  dragState = null;
  zoomWrap.classList.remove('panning');
}, { passive: true });

pedestal.addEventListener('wheel', (e) => {
  const z = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--zoom')) || 1;
  if (z <= 1.001) return;
  const deltaX = (e.shiftKey ? e.deltaY : e.deltaX) || 0;
  const deltaY = (e.shiftKey ? 0 : e.deltaY) || 0;
  const speed = 0.8;
  const next = clampPan(pan.x - deltaX * speed, pan.y - deltaY * speed);
  pan.x = next.x; pan.y = next.y;
  applyPan();
  e.preventDefault();
}, { passive: false });

/* ============================================================
   12) ÉVÉNEMENTS PAGE
   ============================================================ */
// Flèches latérales
sidePrev.addEventListener("click", prevPage);
sideNext.addEventListener("click", nextPage);

// Clavier
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") nextPage();
  if (e.key === "ArrowLeft")  prevPage();
});

// Gestes tactiles
let touchStartX = 0;
bookEl.addEventListener("touchstart", (e) => {
  if (e.touches && e.touches.length === 1) touchStartX = e.touches[0].clientX;
}, { passive: true });
bookEl.addEventListener("touchend", (e) => {
  if (!touchStartX) return;
  const endX = (e.changedTouches && e.changedTouches[0]?.clientX) || 0;
  const dx = endX - touchStartX;
  if (dx < -40) nextPage();
  else if (dx > 40) prevPage();
  touchStartX = 0;
}, { passive: true });

// Clic direct sur les pages
leftEl.addEventListener("click",()=>{ if(!isAnimating && viewIndex>0) prevPage(); });
rightEl.addEventListener("click",()=>{ if(!isAnimating && viewIndex<views.length-1) nextPage(); });

/* ============================================================
   13) INIT
   ============================================================ */
function init() {
  fitBookToContainer();
  setZoom(1);
  renderStatic();
  setTimeout(() => { fitBookToContainer(); updatePanBoundsAndClamp(); updatePannableState(); }, 0);
}
init();
</script>
