<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial;
  background: #f5f5f5;
}

/* 📌 FULL SHAREPOINT WIDTH */
.book-scene {
  width: 100%;
  height: 70vh;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 2000px;
}

.book {
  width: min(1100px, 95%);
  height: 100%;
  display: flex;
  position: relative;
}

/* 📄 PAGES */
.page {
  width: 50%;
  height: 100%;
  background: white;
  border: 1px solid #ddd;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page.left {
  border-radius: 8px 0 0 8px;
  border-right: none;
}

.page.right {
  border-radius: 0 8px 8px 0;
  border-left: none;
}

/* image */
img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-top: 1rem;
}

button {
  padding: 8px 20px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}

button:disabled {
  opacity: 0.4;
  cursor: default;
}

#indicator {
  display: flex;
  align-items: center;
}
</style>
</head>

<body>

<div class="book-scene">
  <div class="book">
    <div class="page left" id="left"></div>
    <div class="page right" id="right"></div>
  </div>
</div>

<div class="controls">
  <button id="prev">← Précédent</button>
  <span id="indicator"></span>
  <button id="next">Suivant →</button>
</div>

<script>

const pages = [
  { url: "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide1.png.jpg" },
  { url: "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide2.png.jpg" },
  { url: "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide3.png.jpg" },
  { url: "https://raw.githubusercontent.com/ManonM15/Flipbook-sharepoint/main/LargeSolutionGuide4.png.jpg" },
];

let index = 0;

const left = document.getElementById("left");
const right = document.getElementById("right");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
const indicator = document.getElementById("indicator");

function render() {

  // 📌 PAGE GAUCHE = page précédente (si existe)
  left.innerHTML = index > 0
    ? `<img src="${pages[index - 1]}">`
    : "";

  // 📌 PAGE DROITE = page actuelle
  right.innerHTML = pages[index]
    ? `<img src="${pages[index]}">`
    : "";

  indicator.textContent = `Page ${index + 1} / ${pages.length}`;

  prev.disabled = index === 0;
  next.disabled = index >= pages.length - 1;
}

function nextPage() {
  if (index < pages.length - 1) {
    index++;
    render();
  }
}

function prevPage() {
  if (index > 0) {
    index--;
    render();
  }
}

prev.addEventListener("click", prevPage);
next.addEventListener("click", nextPage);

render();

</script>

</body>
</html>
