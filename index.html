<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Livre – SharePoint</title>
<style>
:root {
  --dur: 900ms; --ease: cubic-bezier(.42,0,.18,1);
  --sw: 26px; --paper: #f7f1e3; --accent: #0b5fff;
  --ui-bg: rgba(255,255,255,.92); --ui-bd: #c9d6e6;
  --zoom: 1; --px: 0px; --py: 0px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{font-family:Arial,sans-serif;background:#edf2fb;overflow:hidden;color:#333}
.app{width:100%;height:100%;display:flex;flex-direction:column}

/* Scène */
.scene{flex:1 1 auto;min-height:0;display:flex;justify-content:center;align-items:center;
  perspective:2800px;padding:12px;overflow:hidden;position:relative}

/* Progression */
.prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.08);z-index:20}
.prog-fill{height:100%;background:var(--accent);border-radius:0 2px 2px 0;transition:width .4s ease}

/* Miniatures */
.thumbs{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:center;background:var(--ui-bg);border:1px solid var(--ui-bd);
  border-radius:24px;padding:6px 12px;backdrop-filter:blur(8px);z-index:30;
  box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:calc(100% - 160px);overflow-x:auto;scrollbar-width:none}
.thumbs::-webkit-scrollbar{display:none}
.thumb{flex:0 0 auto;width:32px;height:44px;border-radius:3px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;background:#ddd}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb.on{border-color:var(--accent);transform:scale(1.1)}
.thumb:hover:not(.on){border-color:#99b8e8;transform:scale(1.05)}

/* Flèches */
.arr{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;
  border:1px solid var(--ui-bd);background:var(--ui-bg);font-size:1.6rem;cursor:pointer;z-index:50;
  box-shadow:0 4px 16px rgba(0,0,0,.18);transition:.2s;display:flex;align-items:center;
  justify-content:center;backdrop-filter:blur(6px)}
.arr:hover:not(:disabled){transform:translateY(-50%) scale(1.1);background:#fff}
.arr:disabled{opacity:.35;cursor:default;box-shadow:none}
.arr.l{left:16px} .arr.r{right:16px}

/* Pedestal / zoom-wrap */
.ped{position:relative;display:grid;place-items:center;overflow:hidden;width:100%;height:100%}
.zw{display:inline-block;transform:translate(var(--px),var(--py)) scale(var(--zoom));
  transform-origin:center;will-change:transform;touch-action:none}
.zw.grab{cursor:grab} .zw.drag{cursor:grabbing}

/* Livre */
.book{position:relative;display:flex;touch-action:pan-y;border-radius:6px;background:var(--paper);
  overflow:visible;transform-style:preserve-3d;
  box-shadow:0 32px 72px rgba(0,0,0,.28),0 8px 20px rgba(0,0,0,.18);
  transition:width var(--dur) var(--ease),height var(--dur) var(--ease);will-change:width,height}

/* Tranches */
.book::before,.book::after{content:"";position:absolute;top:4px;bottom:4px;width:10px;z-index:0;
  background:repeating-linear-gradient(180deg,#e8e4da 0,#e8e4da 1.5px,#d8d3c6 1.5px,#d8d3c6 3px)}
.book::before{left:-8px;border-radius:4px 0 0 4px;transform:skewY(2deg);box-shadow:inset -2px 0 4px rgba(0,0,0,.2)}
.book::after{right:-8px;border-radius:0 4px 4px 0;transform:skewY(-2deg);box-shadow:inset 2px 0 4px rgba(0,0,0,.2)}
.book.nl:not(.cv)::before,.book.nr:not(.cv)::after{display:none}

/* Reliure */
.spine{position:absolute;top:-6px;bottom:-6px;left:calc(50% - var(--sw)/2);width:var(--sw);
  pointer-events:none;z-index:5;border-radius:3px;
  background:linear-gradient(90deg,rgba(0,0,0,.28) 0%,rgba(0,0,0,.06) 14%,transparent 32%,transparent 68%,rgba(0,0,0,.06) 86%,rgba(0,0,0,.28) 100%),
             linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.02) 14%,transparent 50%,rgba(0,0,0,.02) 86%,rgba(0,0,0,.18));
  box-shadow:inset 0 0 28px rgba(0,0,0,.38),0 0 20px rgba(0,0,0,.28);transition:opacity .3s,width .2s}
.book.cv .spine,.book.op .spine{opacity:0}

/* Pages */
.pg{width:50%;background:var(--paper);overflow:hidden;display:flex;align-items:center;
  justify-content:center;user-select:none;position:relative;z-index:1;transition:width var(--dur) var(--ease)}
.pg.L{border-radius:6px 0 0 6px;transform-origin:right center}
.pg.R{border-radius:0 6px 6px 0;transform-origin:left center}
.book.cv .pg{border-radius:6px}
.pg::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,transparent 8%,transparent 92%,rgba(0,0,0,.05))}
.pg.L::after,.pg.R::after{content:"";position:absolute;top:0;bottom:0;width:60px;pointer-events:none;z-index:2;transition:opacity .3s}
.pg.L::after{right:0;background:linear-gradient(90deg,transparent,rgba(0,0,0,.18) 85%,rgba(0,0,0,.28))}
.pg.R::after{left:0; background:linear-gradient(270deg,transparent,rgba(0,0,0,.18) 85%,rgba(0,0,0,.28))}
.book.cv .pg::after{opacity:0}
.pg img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;
  -webkit-user-drag:none;opacity:0;transition:opacity 220ms ease-out}
.pg img.on{opacity:1}

/* Spinner */
.spin-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1}
.spin{width:32px;height:32px;border:3px solid rgba(0,0,0,.1);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* Feuille animée */
.flip{position:absolute;top:0;bottom:0;width:50%;z-index:6;transform-style:preserve-3d;pointer-events:none;will-change:transform}
.flip.cov{width:100%}
.face{position:absolute;inset:0;overflow:hidden;background:var(--pape"https://github.com/ManonM15/Flipbook-sharepoint/blob/main/BookLargeSolution(1).png"r);
  backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center}
.face img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.face.bk{transform:rotateY(180deg)}
.crease{position:absolute;inset:0;pointer-events:none;opacity:0}
.face:not(.bk) .crease{background:linear-gradient(90deg,transparent 48%,rgba(0,0,0,.55))}
.face.bk       .crease{background:linear-gradient(90deg,rgba(0,0,0,.55) 0%,transparent 52%)}

/* Ombres portées */
.lsh{position:absolute;top:0;bottom:0;width:42%;z-index:3;pointer-events:none;opacity:0;will-change:opacity}
.lsh.fr {right:50%;background:linear-gradient(270deg,rgba(0,0,0,.32),transparent)}
.lsh.fl {left:50%; background:linear-gradient(90deg,transparent,rgba(0,0,0,.32))}
.lsh.cfr{right:0;  width:60%;background:linear-gradient(270deg,rgba(0,0,0,.32),transparent)}
.lsh.cfl{left:0;   width:60%;background:linear-gradient(90deg,transparent,rgba(0,0,0,.32))}

/* Contrôles bas */
.ctrl{flex:0 0 auto;display:flex;justify-content:center;flex-wrap:wrap;gap:.8rem;padding:8px 12px 12px;align-items:center}
#ind{min-width:140px;text-align:center;font-size:.9rem;font-weight:500}
.zc{display:inline-flex;align-items:center;gap:8px;font-size:.9rem}
.zc input{width:140px;accent-color:var(--accent)}
.zv{min-width:3.5em;text-align:right}
.ibtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--ui-bd);background:var(--ui-bg);
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.ibtn:hover{background:#fff;transform:scale(1.06)}
.ibtn:active{transform:scale(.97)}

:fullscreen body{background:#222}
:fullscreen .thumbs{bottom:14px}

@media(max-width:600px){
  .arr{width:40px;height:40px;font-size:1.2rem}
  .arr.l{left:4px} .arr.r{right:4px}
  .thumbs{padding:5px 8px;gap:4px} .thumb{width:26px;height:36px}
  .zc input{width:100px} .ctrl{gap:.5rem;padding:6px 8px 10px} #ind{min-width:110px;font-size:.82rem}
}
@media(prefers-reduced-motion:reduce){
  .flip,.face,.lsh,.pg img,.pg,.book,.thumb,.ibtn,.arr,.prog-fill{transition:none!important}
  .spin{animation:none!important}
}
</style>
</head>
<body>
<div class="app">
  <div class="scene" id="scene">
    <div class="prog"><div class="prog-fill" id="prog"></div></div>
    <button class="arr l" id="prev" aria-label="Page précédente">❮</button>
    <button class="arr r" id="next" aria-label="Page suivante">❯</button>
    <div class="thumbs" id="thumbs" role="navigation" aria-label="Miniatures"></div>
    <div class="ped" id="ped">
      <div class="zw" id="zw">
        <div class="book" id="book" role="region" aria-live="polite">
          <div class="pg L" id="PL" aria-label="Page gauche"></div>
          <div class="spine"></div>
          <div class="pg R" id="PR" aria-label="Page droite"></div>
          <div class="lsh fr" id="lR"></div>
          <div class="lsh fl" id="lL"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="ctrl">
    <span id="ind" aria-live="polite"></span>
    <div class="zc">
      <button class="ibtn" id="zm" aria-label="Dézoomer">−</button>
      <input id="zr" type="range" min=".6" max="2.5" step=".05" value="1" aria-label="Zoom">
      <button class="ibtn" id="zp" aria-label="Zoomer">+</button>
      <span class="zv" id="zl">100%</span>
    </div>
    <button class="ibtn" id="fs" aria-label="Plein écran" title="Plein écran">⛶</button>
  </div>
</div>
<script>
/* ── CONFIG ── */
const PW=210, PH=297, pRatio=PW/PH, sRatio=2*PW/PH;

/* ── URLS ── */
const normalize = url => {
  if (typeof url !== "string") return null;
  const m = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/i);
  if (m) return `https://raw.githubusercontent.com/${m[1]}/${m[2]}/${m[3]}/${m[4].split('/').map(encodeURIComponent).join('/')}`;
  if (/raw\.githubusercontent\.com/i.test(url)) {
    const p=url.split('/');
    return p.length>7 ? p.slice(0,7).join('/')+'/'+p.slice(7).map(s=>encodeURIComponent(decodeURIComponent(s))).join('/') : url;
  }
  return url;
};

const PAGES = [
  "https://github.com/ManonM15/Flipbook-sharepoint/blob/main/BookLargeSolution(1).png",
  "https://github.com/ManonM15/Flipbook-sharepoint/blob/main/BookLargeSolution(2).png",
  "https://github.com/ManonM15/Flipbook-sharepoint/blob/main/BookLargeSolution(3).png",
  "https://github.com/ManonM15/Flipbook-sharepoint/blob/main/BookLargeSolution(4).png",
].map(normalize).filter(Boolean);

/* ── VUES ── */
const views = (() => {
  const v=[{l:null,r:PAGES[0],cv:"front"}];
  for (let i=1;i<PAGES.length;) {
    if (i===PAGES.length-1) { v.push({l:PAGES[i],r:null,cv:"back"}); i++; }
    else { v.push({l:PAGES[i],r:PAGES[i+1],cv:false}); i+=2; }
  }
  return v;
})();

/* ── DOM ── */
const $=id=>document.getElementById(id);
const PL=$("PL"),PR=$("PR"),book=$("book"),scene=$("scene"),ped=$("ped"),zw=$("zw");
const lR=$("lR"),lL=$("lL"),ind=$("ind"),prog=$("prog"),thumbsEl=$("thumbs"),zr=$("zr"),zl=$("zl");
const btnPrev=$("prev"),btnNext=$("next");
let vi=0, busy=false;

/* ── IMAGES ── */
const cache=new Set();
const mkImg=(src,alt)=>{
  const img=document.createElement("img");
  img.alt=alt||""; img.loading="lazy"; img.decoding="async"; img.draggable=false; img.src=src;
  img.addEventListener("load",()=>{cache.add(src);requestAnimationFrame(()=>img.classList.add("on"));});
  img.addEventListener("error",()=>{img.style.opacity=.3;img.classList.add("on");});
  return img;
};
const preload=src=>src&&!cache.has(src)?new Promise(r=>{const i=new Image();i.onload=i.onerror=r;i.src=src;}):Promise.resolve();
const mkSpinner=()=>{const d=document.createElement("div");d.className="spin-wrap";d.innerHTML='<div class="spin"></div>';return d;};

/* ── TAILLE ── */
let rT;
const fit=()=>{
  const {width:W,height:H}=scene.getBoundingClientRect();
  const isCov=views[vi]?.cv, ratio=isCov?pRatio:sRatio;
  let w=W-24, h=w/ratio;
  if(h>H-24){h=H-24;w=h*ratio;}
  book.style.width=w+"px"; book.style.height=h+"px";
  document.documentElement.style.setProperty("--sw",Math.max(8,Math.min(36,w*.018)).toFixed(1)+"px");
  panClamp(); pannableState();
};
new ResizeObserver(()=>{clearTimeout(rT);rT=setTimeout(fit,40);}).observe(scene);

/* ── RENDER ── */
const applyLayout=v=>{
  const isCov=v.cv==="front"||v.cv==="back";
  book.classList.toggle("cv",isCov);
  book.classList.toggle("nl",!v.l);
  book.classList.toggle("nr",!v.r);
  PL.style.width=v.cv==="front"?"0%":v.cv==="back"?"100%":"50%";
  PR.style.width=v.cv==="front"?"100%":v.cv==="back"?"0%":"50%";
};

const setPage=(el,src,alt)=>{
  if(!src) return;
  const sp=mkSpinner(); el.appendChild(sp);
  const img=mkImg(src,alt); el.appendChild(img);
  img.addEventListener("load",()=>sp.remove(),{once:true});
  img.addEventListener("error",()=>sp.remove(),{once:true});
};

const render=()=>{
  const v=views[vi]||{};
  [PL,PR].forEach(el=>el.innerHTML="");
  applyLayout(v); fit();
  setPage(PL,v.l,"Page gauche"); setPage(PR,v.r,"Page droite");
  ind.textContent=`Vue ${vi+1} / ${views.length}`;
  btnPrev.disabled=busy||vi===0; btnNext.disabled=busy||vi>=views.length-1;
  prog.style.width=(views.length<=1?100:vi/(views.length-1)*100)+"%";
  thumbsEl.querySelectorAll(".thumb").forEach((t,i)=>t.classList.toggle("on",i===vi));
  thumbsEl.querySelector(".thumb.on")?.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  [-1,1,2].forEach(d=>{const v=views[vi+d];if(v){preload(v.l);preload(v.r);}});
};

/* ── MINIATURES ── */
views.forEach((v,i)=>{
  const src=v.r||v.l; if(!src) return;
  const div=document.createElement("div");
  div.className="thumb"+(i===0?" on":"");
  div.setAttribute("role","button"); div.setAttribute("aria-label",`Vue ${i+1}`); div.tabIndex=0;
  div.innerHTML=`<img src="${src}" alt="Vue ${i+1}" loading="lazy">`;
  div.addEventListener("click",()=>{if(!busy&&i!==vi)jumpTo(i);});
  div.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();div.click();}});
  thumbsEl.appendChild(div);
});

const jumpTo=target=>{
  if(busy)return;
  const dir=target>vi?"next":"prev";
  const step=()=>{if(vi===target){render();return;} turn(dir,()=>{vi+=dir==="next"?1:-1;vi!==target?setTimeout(step,50):render();});};
  step();
};

/* ── ANIMATION ── */
const eio=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const rafAnim=(ms,upd,end)=>{const s=performance.now();const f=n=>{const t=Math.min((n-s)/ms,1);upd(eio(t));t<1?requestAnimationFrame(f):end?.();};requestAnimationFrame(f);};
const getDur=()=>parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--dur"))||900;

const mkFace=(extra,src,alt)=>{
  const d=document.createElement("div"); d.className="face"+extra;
  if(src)d.appendChild(mkImg(src,alt));
  const cr=document.createElement("div"); cr.className="crease"; d.appendChild(cr);
  return {el:d,cr};
};

const runAnim=(flip,front,back,lsh,ms,fromLeft,onEnd)=>{
  lsh.style.opacity="0";
  rafAnim(ms,p=>{
    const angle=fromLeft?-180*p:180*p;
    flip.style.transform=`rotateY(${angle}deg) rotateX(${Math.sin(p*Math.PI)*7}deg)`;
    const c=Math.sin(p*Math.PI)*.92;
    front.cr.style.opacity=back.cr.style.opacity=String(c);
    lsh.style.opacity=String(c*.98);
  },()=>{flip.remove();lsh.style.opacity="0";onEnd();});
};

const turn=(dir,cb)=>{
  if(busy)return; busy=true; btnPrev.disabled=btnNext.disabled=true;
  const cv=views[vi]||{}, ni=vi+(dir==="next"?1:-1), nv=views[ni]||{}, ms=getDur();
  const done=()=>{cb?.();busy=false;render();};

  const buildFlip=(isFull,origLeft,leftPos)=>{
    const f=document.createElement("div");
    f.className="flip"+(isFull?" cov":"");
    f.style.transformOrigin=origLeft?"left center":"right center";
    f.style.left=leftPos; return f;
  };

  /* Couverture avant */
  if((dir==="next"&&cv.cv==="front")||(dir==="prev"&&nv.cv==="front")){
    const src=dir==="next"?cv.r:nv.r;
    if(dir==="next"){book.classList.remove("cv","nl","nr");PL.style.width=PR.style.width="50%";PL.innerHTML=PR.innerHTML="";if(nv.l)PL.appendChild(mkImg(nv.l,"g"));if(nv.r)PR.appendChild(mkImg(nv.r,"d"));fit();}
    preload(src).then(()=>{
      const flip=buildFlip(true,true,"0%"),front=mkFace("",src,"Couverture"),back=mkFace(" bk",null,"");
      flip.appendChild(front.el);flip.appendChild(back.el);book.appendChild(flip);
      lR.className="lsh cfr"; runAnim(flip,front,back,lR,ms,true,()=>{lR.className="lsh fr";done();});
    });
    return;
  }

  /* 4e de couverture */
  if((dir==="next"&&nv.cv==="back")||(dir==="prev"&&cv.cv==="back")){
    const fSrc=dir==="next"?cv.r:nv.r, bSrc=dir==="next"?nv.l:cv.l;
    if(dir==="prev"){book.classList.remove("cv","nl","nr");PL.style.width=PR.style.width="50%";PL.innerHTML=PR.innerHTML="";if(nv.l)PL.appendChild(mkImg(nv.l,"g"));if(nv.r)PR.appendChild(mkImg(nv.r,"d"));fit();}
    Promise.all([preload(fSrc),preload(bSrc)]).then(()=>{
      const flip=buildFlip(false,false,"50%"),front=mkFace("",fSrc,"Recto"),back=mkFace(" bk",bSrc,"4e");
      flip.appendChild(front.el);flip.appendChild(back.el);book.appendChild(flip);
      PR.innerHTML=""; lL.className="lsh cfl";
      runAnim(flip,front,back,lL,ms,false,()=>{
        lL.className="lsh fl";
        if(dir==="next"){book.classList.add("cv","nr");PL.style.width="100%";PR.style.width="0%";}
        done();
      });
    });
    return;
  }

  /* Tourne-page normal */
  const fSrc=dir==="next"?cv.r:cv.l, bSrc=dir==="next"?nv.l:nv.r;
  if(!fSrc){done();return;}
  Promise.all([preload(fSrc),preload(bSrc)]).then(()=>{
    const isNext=dir==="next";
    const flip=buildFlip(false,isNext,isNext?"50%":"0%");
    const front=mkFace("",fSrc,"Recto"),back=mkFace(" bk",bSrc,"Verso");
    flip.appendChild(front.el);flip.appendChild(back.el);book.appendChild(flip);
    const lsh=isNext?lR:lL;
    runAnim(flip,front,back,lsh,ms,isNext,done);
  });
};

/* ── NAVIGATION ── */
const go=dir=>{
  if(busy)return;
  if(dir==="next"&&vi<views.length-1) turn("next",()=>vi++);
  else if(dir==="prev"&&vi>0) turn("prev",()=>vi--);
};
btnNext.addEventListener("click",()=>go("next"));
btnPrev.addEventListener("click",()=>go("prev"));
PL.addEventListener("click",()=>{if(!busy&&vi>0)go("prev");});
PR.addEventListener("click",()=>{if(!busy&&vi<views.length-1)go("next");});

/* Swipe */
let tx=0,ty=0;
book.addEventListener("touchstart",e=>{if(e.touches.length===1){tx=e.touches[0].clientX;ty=e.touches[0].clientY;}},{passive:true});
book.addEventListener("touchend",e=>{
  const dx=(e.changedTouches[0]?.clientX||0)-tx,dy=(e.changedTouches[0]?.clientY||0)-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>35)go(dx<0?"next":"prev");
  tx=ty=0;
},{passive:true});

/* ── ZOOM & PAN ── */
let pan={x:0,y:0},pMax={x:0,y:0},drag=null,pinch=null;
const getZ=()=>parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--zoom"))||1;
const applyPan=()=>{
  document.documentElement.style.setProperty("--px",pan.x.toFixed(1)+"px");
  document.documentElement.style.setProperty("--py",pan.y.toFixed(1)+"px");
};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const panClamp=()=>{
  const z=getZ(),br=book.getBoundingClientRect(),pr=ped.getBoundingClientRect();
  pMax.x=Math.max(0,(br.width*z-pr.width)/2); pMax.y=Math.max(0,(br.height*z-pr.height)/2);
  pan.x=clamp(pan.x,-pMax.x,pMax.x); pan.y=clamp(pan.y,-pMax.y,pMax.y); applyPan();
};
const pannableState=()=>zw.classList.toggle("grab",getZ()>1.001&&(pMax.x>0||pMax.y>0));
const setZ=v=>{
  const z=Math.max(.6,Math.min(2.5,+v));
  document.documentElement.style.setProperty("--zoom",z);
  zr.value=z; zl.textContent=Math.round(z*100)+"%";
  if(z<=1.001){pan.x=pan.y=0;}
  panClamp(); pannableState();
};

zr.addEventListener("input",e=>setZ(e.target.value));
$("zp").addEventListener("click",()=>setZ(getZ()+.1));
$("zm").addEventListener("click",()=>setZ(getZ()-.1));
zw.addEventListener("dblclick",()=>setZ(1));

ped.addEventListener("wheel",e=>{
  if(e.ctrlKey||e.metaKey){e.preventDefault();setZ(getZ()-e.deltaY*.001);return;}
  const z=getZ(); if(z<=1.001)return;
  pan.x=clamp(pan.x-(e.shiftKey?e.deltaY:e.deltaX)*.8,-pMax.x,pMax.x);
  pan.y=clamp(pan.y-(e.shiftKey?0:e.deltaY)*.8,-pMax.y,pMax.y);
  applyPan(); e.preventDefault();
},{passive:false});

ped.addEventListener("mousedown",e=>{if(getZ()<=1.001||e.button)return;drag={sx:e.clientX,sy:e.clientY,ox:pan.x,oy:pan.y};zw.classList.add("drag");e.preventDefault();});
window.addEventListener("mousemove",e=>{if(!drag)return;pan.x=clamp(drag.ox+e.clientX-drag.sx,-pMax.x,pMax.x);pan.y=clamp(drag.oy+e.clientY-drag.sy,-pMax.y,pMax.y);applyPan();});
window.addEventListener("mouseup",()=>{drag=null;zw.classList.remove("drag");});

ped.addEventListener("touchstart",e=>{
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch={d:Math.hypot(dx,dy),z:getZ()};return;}
  if(getZ()<=1.001||e.touches.length!==1)return;
  const t=e.touches[0];drag={sx:t.clientX,sy:t.clientY,ox:pan.x,oy:pan.y};zw.classList.add("drag");
},{passive:true});
ped.addEventListener("touchmove",e=>{
  if(e.touches.length===2&&pinch){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;setZ(pinch.z*(Math.hypot(dx,dy)/pinch.d));return;}
  if(!drag||e.touches.length!==1)return;
  const t=e.touches[0];pan.x=clamp(drag.ox+t.clientX-drag.sx,-pMax.x,pMax.x);pan.y=clamp(drag.oy+t.clientY-drag.sy,-pMax.y,pMax.y);applyPan();
},{passive:false});
ped.addEventListener("touchend",e=>{if(e.touches.length<2)pinch=null;if(!drag)return;drag=null;zw.classList.remove("drag");},{passive:true});

/* ── PLEIN ÉCRAN ── */
$("fs").addEventListener("click",()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen().catch(()=>{}));
document.addEventListener("fullscreenchange",()=>setTimeout(fit,80));

/* ── INIT ── */
fit(); setZ(1); render();
setTimeout(()=>{fit();panClamp();pannableState();},0);
</script>
</body>
</html>
