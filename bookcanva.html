<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; flex-direction: column; align-items: center;
         padding: 2rem; font-family: Arial, sans-serif; background: #f5f5f5; }

  .book-scene {
    perspective: 2000px;
    width: 800px;
    height: 500px;
    position: relative;
  }
  .book { width: 100%; height: 100%; position: relative; }

  .page-left-static {
    position: absolute; left: 0; width: 50%; height: 100%;
    background: white; border: 1px solid #ddd;
    border-radius: 8px 0 0 8px; overflow: hidden;
  }

  .page {
    position: absolute; left: 50%; width: 50%; height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.7s ease-in-out;
    cursor: pointer;
  }
  .page-front, .page-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; overflow: hidden;
    background: white; border: 1px solid #ddd;
  }
  .page-front { border-radius: 0 8px 8px 0; border-left: none; }
  .page-back  { transform: rotateY(180deg); border-radius: 8px 0 0 8px; border-right: none; }
  .page.flipped { transform: rotateY(-180deg); }

  .spine {
    position: absolute; left: 50%; top: 0;
    width: 4px; height: 100%;
    background: #ccc; transform: translateX(-50%);
    z-index: 10; box-shadow: 0 0 6px rgba(0,0,0,0.1);
  }

  iframe { width: 100%; height: 100%; border: none; display: block; }

  .controls {
    display: flex; align-items: center; gap: 1rem; margin-top: 1rem;
  }
  .controls button {
    padding: 8px 20px; border: 1px solid #ccc; border-radius: 6px;
    background: white; cursor: pointer; font-size: 14px;
  }
  .controls button:disabled { opacity: 0.4; cursor: default; }
  #indicator { font-size: 14px; color: #555; }
</style>
</head>
<body>

<div class="book-scene">
  <div class="book" id="book">
    <div class="page-left-static" id="left-static"></div>
    <div class="spine"></div>
  </div>
</div>

<div class="controls">
  <button id="prev" disabled>← Précédent</button>
  <span id="indicator"></span>
  <button id="next">Suivant →</button>
</div>

<script>
// ==============================
// CONFIGUREZ VOS PAGES ICI
// ==============================
const pages = [
  { url: "https://www.canva.com/design/VOTRE_ID_1/view?embed" },
  { url: "https://www.canva.com/design/VOTRE_ID_2/view?embed" },
  { url: "https://www.canva.com/design/VOTRE_ID_3/view?embed" },
  { url: "https://www.canva.com/design/VOTRE_ID_4/view?embed" },
];
// ==============================

let current = 0;
const book = document.getElementById('book');
const leftStatic = document.getElementById('left-static');
const prev = document.getElementById('prev');
const next = document.getElementById('next');
const indicator = document.getElementById('indicator');

function makeIframe(url) {
  return `<iframe src="${url}" allowfullscreen></iframe>`;
}

function render() {
  leftStatic.innerHTML = makeIframe(pages[current].url);
  document.querySelectorAll('.page').forEach(p => p.remove());

  if (pages[current + 1]) {
    const p = document.createElement('div');
    p.className = 'page';
    p.innerHTML = `
      <div class="page-front">${makeIframe(pages[current + 1].url)}</div>
      <div class="page-back">${makeIframe(pages[current].url)}</div>`;
    book.appendChild(p);
  }

  indicator.textContent = `Page ${current + 1} sur ${pages.length}`;
  prev.disabled = current === 0;
  next.disabled = current >= pages.length - 1;
}

function goNext() {
  if (current >= pages.length - 1) return;
  const p = document.querySelector('.page');
  if (p) {
    p.classList.add('flipped');
    setTimeout(() => { current++; render(); }, 700);
  }
}

function goPrev() {
  if (current <= 0) return;
  current--;
  render();
  const p = document.querySelector('.page');
  if (p) {
    p.style.transition = 'none';
    p.classList.add('flipped');
    void p.offsetWidth;
    p.style.transition = '';
    p.classList.remove('flipped');
  }
}

prev.addEventListener('click', goPrev);
next.addEventListener('click', goNext);
render();
</script>
</body>
</html>
